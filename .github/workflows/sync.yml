name: Sync from Codeberg
on:
  schedule:
    - cron: '0 * * * *'  # Hourly
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          git remote add codeberg https://codeberg.org/MocaccinoOS/Vajo.git
          git fetch codeberg
          git push origin codeberg/main:main --force
